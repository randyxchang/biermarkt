<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>biermarkt</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="assets/favicon.png" sizes="64x64">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" sizes="180x180">
<style>
  :root {
    color-scheme: dark;
    --page: #000;
    --land: #000;
    --land-stroke: rgba(255,255,255,0.35);
    --graticule: rgba(255,255,255,0.08);
    --ink: #fff;
    --ink-2: rgba(255,255,255,0.75);
    --ink-muted: rgba(255,255,255,0.52);
    --hairline: rgba(255,255,255,0.18);
    --tile: #000;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --page: #fff;
    --land: #fff;
    --land-stroke: rgba(0,0,0,0.35);
    --graticule: rgba(0,0,0,0.08);
    --ink: #000;
    --ink-2: rgba(0,0,0,0.75);
    --ink-muted: rgba(0,0,0,0.52);
    --hairline: rgba(0,0,0,0.18);
    --tile: #fff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--page); color: var(--ink); }
  body {
    font-family: ui-monospace, "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-variant-numeric: tabular-nums;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header { text-align: center; padding: 2.2rem 1rem 0.4rem; }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 400;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    text-transform: lowercase;
    margin: 0;
  }
  #airports {
    width: min(1200px, 100%);
    display: flex;
    gap: 0.45rem;
    overflow-x: auto;
    padding: 1.1rem 1rem 0.4rem;
    scrollbar-width: none;
    -webkit-mask-image: linear-gradient(to right, transparent, black 4%, black 96%, transparent);
    mask-image: linear-gradient(to right, transparent, black 4%, black 96%, transparent);
  }
  #airports::-webkit-scrollbar { display: none; }
  .chip {
    flex: none;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.28rem 0.7rem;
    border: 1px solid var(--hairline);
    border-radius: 10px;
    background: var(--tile);
    color: var(--ink-2);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s;
    user-select: none;
  }
  .chip .n { color: var(--ink-muted); font-variant-numeric: tabular-nums; }
  .chip:hover { border-color: var(--ink); }
  .header-controls {
    display: inline-grid;
    grid-auto-flow: column;
    margin-top: 0.6rem;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    overflow: hidden;
    background: var(--page);
  }
  .header-controls button {
    display: inline-grid;
    width: 38px;
    height: 30px;
    place-items: center;
    padding: 0;
    border: 0;
    color: var(--ink);
    background: var(--page);
    font: inherit;
    cursor: pointer;
  }
  .header-controls button + button { border-left: 1px solid var(--hairline); }
  .header-controls button:hover { background: var(--ink); color: var(--page); }
  .header-controls button:focus-visible { outline: 2px solid var(--ink); outline-offset: -3px; }
  #theme-toggle svg { width: 15px; height: 15px; display: block; }
  #theme-toggle .moon { display: none; }
  :root[data-theme="light"] #theme-toggle .sun { display: none; }
  :root[data-theme="light"] #theme-toggle .moon { display: block; }
  #details-toggle { font-size: 0.95rem; font-weight: 700; }
  #map-wrap { width: min(1200px, 100%); padding: 0 0.5rem; position: relative; }
  #projection-toggle svg { width: 16px; height: 16px; display: block; }
  #projection-toggle .map-icon { display: none; }
  #projection-toggle[data-projection="orthographic"] .globe-icon { display: none; }
  #projection-toggle[data-projection="orthographic"] .map-icon { display: block; }
  [hidden] { display: none !important; }
  :root[data-details="hidden"] #airports,
  :root[data-details="hidden"] #stats { display: none !important; }
  :root[data-details="hidden"] #site-footer { margin-top: 1rem; }
  svg { width: 100%; height: auto; display: block; cursor: grab; touch-action: pan-y pinch-zoom; }
  svg:active { cursor: grabbing; }
  #stats {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.6rem;
    padding: 0.4rem 1rem 2.5rem;
  }
  .tile {
    min-width: 130px;
    padding: 0.9rem 1.2rem;
    border: 1px solid var(--hairline);
    border-radius: 2px;
    background: var(--tile);
    text-align: center;
  }
  .tile .v {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 1.5rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .tile .k {
    color: var(--ink-muted);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-top: 0.25rem;
  }
  /* the four times sit in the corners of the map frame, clear of the
     projection itself; they never intercept a drag or a hover */
  #clocks { position: absolute; inset: 0; pointer-events: none; z-index: 2; }
  .clock {
    position: absolute;
    color: var(--ink-muted);
    font-size: 0.76rem;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.1em;
  }
  .clock:nth-child(1) { top: 0.4rem; left: 1.1rem; }
  .clock:nth-child(2) { top: 0.4rem; right: 1.1rem; }
  .clock:nth-child(3) { bottom: 0.4rem; left: 1.1rem; }
  .clock:nth-child(4) { bottom: 0.4rem; right: 1.1rem; }
  .clock .s { font-size: 0.82em; opacity: 0.6; }
  @media (max-width: 640px) {
    .clock { font-size: 0.64rem; letter-spacing: 0.06em; }
    .clock:nth-child(1), .clock:nth-child(2) { top: 0.2rem; }
    .clock:nth-child(3), .clock:nth-child(4) { bottom: 0.2rem; }
    .clock:nth-child(1), .clock:nth-child(3) { left: 0.6rem; }
    .clock:nth-child(2), .clock:nth-child(4) { right: 0.6rem; }
  }
  #splash { position: fixed; inset: 0; z-index: 50; cursor: pointer; }
  .splash-half {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    display: flex;
    align-items: center;
    overflow: hidden;
    background: var(--page);
    transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1);
  }
  .splash-half.left { left: 0; justify-content: flex-end; }
  .splash-half.right { right: 0; justify-content: flex-start; }
  .splash-half span {
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(4rem, 17vw, 11rem);
    line-height: 1;
    color: var(--ink);
  }
  :root[data-splash="done"] .splash-half.left { transform: translateX(-100%); }
  :root[data-splash="done"] .splash-half.right { transform: translateX(100%); }
  :root[data-splash="open"], :root[data-splash="open"] body { overflow: hidden; }
  @media (prefers-reduced-motion: reduce) {
    .splash-half { transition: none; }
  }
  #site-footer {
    margin-top: -1.4rem;
    padding-bottom: 2.2rem;
  }
  #contact {
    font-family: Georgia, "Times New Roman", serif;
    color: var(--ink-muted);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-decoration: none;
  }
  #contact:hover { color: var(--ink-2); text-decoration: underline; }
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--page);
    border: 1px solid var(--hairline);
    border-radius: 2px;
    padding: 0.5rem 0.7rem;
    font-size: 0.8rem;
    color: var(--ink-2);
    max-width: 260px;
    opacity: 0;
    transition: opacity 0.12s;
    z-index: 10;
    box-shadow: none;
  }
  #tooltip .t { color: var(--ink); font-weight: 600; margin-bottom: 0.15rem; }
</style>
<script>
  try {
    document.documentElement.dataset.theme =
      localStorage.getItem("biermarkt-theme") === "light" ? "light" : "dark";
    document.documentElement.dataset.details =
      localStorage.getItem("biermarkt-details") === "visible" ? "visible" : "hidden";
  } catch (_) {
    document.documentElement.dataset.theme = "dark";
    document.documentElement.dataset.details = "hidden";
  }
  document.documentElement.dataset.splash = "open";
</script>
</head>
<body>
<div id="splash" role="button" tabindex="0" aria-label="Enter biermarkt">
  <div class="splash-half left"><span aria-hidden="true">B</span></div>
  <div class="splash-half right"><span aria-hidden="true">M</span></div>
</div>
<script>
  // Splash gate: resolves once the curtain parts, so the map's draw-in
  // animation plays for the visitor instead of behind the splash.
  (function () {
    const splash = document.getElementById("splash");
    let release;
    window.splashReady = new Promise(resolve => { release = resolve; });
    const slow = !window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    function enter() {
      if (document.documentElement.dataset.splash === "done") return;
      document.documentElement.dataset.splash = "done";
      release();
      setTimeout(() => { splash.hidden = true; }, slow ? 950 : 0);
    }
    splash.addEventListener("click", enter);
    window.addEventListener("keydown", enter, { once: true });
    splash.focus();
  })();
</script>
<header>
  <h1>biermarkt</h1>
  <div class="header-controls" role="group" aria-label="Display controls">
    <button id="theme-toggle" type="button" aria-label="Switch to light mode">
      <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button id="details-toggle" type="button" aria-label="Show airport codes and statistics" aria-pressed="false"><span aria-hidden="true">#</span></button>
    <button id="projection-toggle" type="button" data-projection="orthographic" aria-label="Switch to flat map projection">
      <svg class="globe-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 2.5 4.5 5.5 4.5 9S15 18.5 12 21M12 3C9 5.5 7.5 8.5 7.5 12S9 18.5 12 21"/></svg>
      <svg class="map-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" aria-hidden="true"><path d="m3 6 6-3 6 3 6-3v15l-6 3-6-3-6 3V6Z"/><path d="M9 3v15M15 6v15"/></svg>
    </button>
  </div>
</header>
<div id="airports" aria-label="All airports"></div>
<div id="map-wrap" data-projection="orthographic">
  <svg id="map"></svg>
  <section id="clocks" aria-label="Local times"></section>
</div>
<div id="stats"></div>
<footer id="site-footer"><a id="contact" href="mailto:bm@biermarkt.org">bm@biermarkt.org</a></footer>
<div id="tooltip"></div>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
(async function () {
  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const themeToggle = document.querySelector("#theme-toggle");
  function syncThemeToggle() {
    const dark = document.documentElement.dataset.theme === "dark";
    themeToggle.setAttribute("aria-label", `Switch to ${dark ? "light" : "dark"} mode`);
  }
  themeToggle.addEventListener("click", () => {
    const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem("biermarkt-theme", next); } catch (_) {}
    syncThemeToggle();
  });
  syncThemeToggle();

  const detailsToggle = document.querySelector("#details-toggle");
  const detailsTargets = [document.querySelector("#airports"), document.querySelector("#stats")];
  let detailsVisible = false;
  try { detailsVisible = localStorage.getItem("biermarkt-details") === "visible"; } catch (_) {}
  function syncDetails() {
    detailsTargets.forEach(element => { element.hidden = !detailsVisible; });
    document.documentElement.dataset.details = detailsVisible ? "visible" : "hidden";
    detailsToggle.setAttribute("aria-pressed", String(detailsVisible));
    detailsToggle.setAttribute("aria-label", `${detailsVisible ? "Hide" : "Show"} airport codes and statistics`);
  }
  detailsToggle.addEventListener("click", () => {
    detailsVisible = !detailsVisible;
    try { localStorage.setItem("biermarkt-details", detailsVisible ? "visible" : "hidden"); } catch (_) {}
    syncDetails();
  });
  syncDetails();

  // local time in each home city, ticking on the second — unlabelled by design.
  // Sorted west to east by current UTC offset, so the stack reads chronologically
  // and stays correct when the zones cross DST on different weeks.
  const ZONES = ["America/New_York", "America/Chicago", "Asia/Dubai", "Europe/London"];
  function utcOffsetMinutes(timeZone, at) {
    const parts = new Intl.DateTimeFormat("en-US", {
      timeZone, hourCycle: "h23",
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit",
    }).formatToParts(at).reduce((acc, p) => (acc[p.type] = p.value, acc), {});
    const asUTC = Date.UTC(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, parts.second);
    return (asUTC - Math.floor(at.getTime() / 1000) * 1000) / 60000;
  }
  const startOfDay = new Date();
  const orderedZones = [...ZONES].sort(
    (a, b) => utcOffsetMinutes(a, startOfDay) - utcOffsetMinutes(b, startOfDay));
  const clocks = orderedZones.map(timeZone => {
    const row = document.createElement("div");
    row.className = "clock";
    const hm = document.createElement("span");
    const sec = document.createElement("span");
    sec.className = "s";
    row.append(hm, sec);
    document.querySelector("#clocks").append(row);
    return {
      hm, sec,
      fmt: new Intl.DateTimeFormat("en-GB", {
        timeZone, hourCycle: "h23",
        hour: "2-digit", minute: "2-digit", second: "2-digit",
      }),
    };
  });
  function tickClocks() {
    const now = new Date();
    for (const c of clocks) {
      const [h, m, s] = c.fmt.format(now).split(":");
      c.hm.textContent = `${h}:${m}`;
      c.sec.textContent = `:${s}`;
    }
  }
  tickClocks();
  // align the first tick to the next second boundary so all four flip together
  setTimeout(() => {
    tickClocks();
    setInterval(tickClocks, 1000);
  }, 1000 - (Date.now() % 1000));

  const projectionToggle = document.querySelector("#projection-toggle");
  const mapWrap = document.querySelector("#map-wrap");
  let projectionMode = "orthographic";
  let projectionTransitioning = false;
  try {
    if (localStorage.getItem("biermarkt-projection") === "natural") projectionMode = "natural";
  } catch (_) {}

  const [world, data] = await Promise.all([
    fetch("assets/countries-110m.json").then(r => r.json()),
    fetch("assets/flights.json").then(r => r.json()),
  ]);

  const W = 1200, H = 620;
  const PROJECTION_PAD = 20;
  const svg = d3.select("#map").attr("viewBox", `0 0 ${W} ${H}`);
  function createProjection(mode) {
    return mode === "orthographic"
      // opens at ~98°W, just north of the equator
      ? d3.geoOrthographic().rotate([98, -10, 0]).clipAngle(90).precision(0.25)
        .fitExtent([[PROJECTION_PAD, PROJECTION_PAD], [W - PROJECTION_PAD, H - PROJECTION_PAD]], { type: "Sphere" })
      : d3.geoNaturalEarth1().fitExtent([[PROJECTION_PAD, PROJECTION_PAD], [W - PROJECTION_PAD, H - PROJECTION_PAD]], { type: "Sphere" });
  }
  // Globe ⇄ flat map runs through a projection that is itself a blend of the
  // two: at alpha 0 it is the orthographic globe, at 1 the Natural Earth map,
  // and in between every point travels its own path between the two. That is
  // what makes the sphere look like it unrolls rather than like one picture
  // being swapped for another.
  function interpolatedProjection(raw0, raw1) {
    let t = 0;
    const mutate = d3.geoProjectionMutator(a => (lambda, phi) => {
      const [x0, y0] = raw0(lambda, phi), [x1, y1] = raw1(lambda, phi);
      return [x0 + a * (x1 - x0), y0 + a * (y1 - y0)];
    });
    return Object.assign(mutate(t), { alpha: a => mutate(t = a) });
  }
  const morph = interpolatedProjection(d3.geoOrthographicRaw, d3.geoNaturalEarth1Raw);
  let morphClip = null;   // clip radius in radians while the unroll is running

  let projection = createProjection(projectionMode);
  const path = d3.geoPath(projection);
  const tooltip = d3.select("#tooltip");
  const spherePath = path({ type: "Sphere" });

  // The flat map uses a fixed silhouette. In globe mode the sphere, its
  // outline, and the mapped content all move together during zoom.
  const clipPath = svg.append("defs").append("clipPath")
    .attr("id", "globe-clip").attr("clipPathUnits", "userSpaceOnUse")
    .append("path").attr("d", spherePath);
  const projectionStage = svg.append("g").attr("class", "projection-stage");
  const globeBackground = projectionStage.append("path").attr("d", spherePath)
    .attr("fill", "var(--page)").attr("class", "globe-background");
  const viewport = projectionStage.append("g").attr("clip-path", "url(#globe-clip)");
  const root = viewport.append("g");
  const globeOutline = projectionStage.append("path").attr("d", spherePath)
    .attr("fill", "none").attr("stroke", "var(--hairline)")
    .attr("stroke-width", 1).attr("pointer-events", "none")
    .attr("vector-effect", "non-scaling-stroke")
    .attr("class", "globe-outline");

  const graticulePath = root.append("path").attr("d", path(d3.geoGraticule10()))
    .attr("fill", "none").attr("stroke", "var(--graticule)").attr("stroke-width", 0.5);
  const countryPaths = root.append("g").selectAll("path")
    .data(topojson.feature(world, world.objects.countries).features)
    .join("path").attr("d", path)
    .attr("fill", "var(--land)").attr("stroke", "var(--land-stroke)")
    .attr("stroke-width", 0.5).attr("class", "country");

  // one entry per (person, route) with flight count — arcs stack visually otherwise
  const routes = new Map();
  for (const f of data.flights) {
    const key = `${f.p}|${[f.from, f.to].sort().join("-")}`;
    if (!routes.has(key)) routes.set(key, { p: f.p, from: f.from, to: f.to, flights: [] });
    routes.get(key).flights.push(f);
  }
  const arcs = [...routes.values()].map(r => {
    const a = data.airports[r.from], b = data.airports[r.to];
    return { ...r, geo: { type: "LineString", coordinates: [[a[0], a[1]], [b[0], b[1]]] } };
  });

  const arcLayer = root.append("g");
  const glow = arcLayer.append("g");
  const core = arcLayer.append("g");
  const hover = arcLayer.append("g");

  const person = i => data.people[i];

  const glowPaths = glow.selectAll("path").data(arcs).join("path")
    .attr("d", d => path(d.geo)).attr("fill", "none")
    .attr("stroke", "var(--ink)")
    .attr("stroke-width", 4.5).attr("stroke-linecap", "round")
    .attr("opacity", 0.16).attr("class", d => `arc p${d.p}`);

  const corePaths = core.selectAll("path").data(arcs).join("path")
    .attr("d", d => path(d.geo)).attr("fill", "none")
    .attr("stroke", "var(--ink)")
    .attr("stroke-width", 1.4).attr("stroke-linecap", "round")
    .attr("opacity", 0.85).attr("class", d => `arc p${d.p}`);

  // draw-in animation — arcs are hidden immediately, then drawn once the
  // splash curtain parts, so the reveal isn't spent behind the splash
  if (!reduceMotion) {
    corePaths.each(function () {
      const len = this.getTotalLength();
      d3.select(this)
        .attr("stroke-dasharray", `${len} ${len}`)
        .attr("stroke-dashoffset", len);
    });
    (window.splashReady || Promise.resolve()).then(() => {
      corePaths.each(function (d, i) {
        d3.select(this).transition()
          .delay(400 + i * (7000 / Math.max(1, arcs.length - 1)))
          .duration(4200).ease(d3.easeCubicOut)
          .attr("stroke-dashoffset", 0)
          .on("end", function () { d3.select(this).attr("stroke-dasharray", null); });
      });
    });
  }

  // wide invisible strokes = hover hit targets bigger than the mark
  const hitPaths = hover.selectAll("path").data(arcs).join("path")
    .attr("d", d => path(d.geo)).attr("fill", "none")
    .attr("stroke", "transparent").attr("stroke-width", 12)
    .attr("class", d => `arc p${d.p}`)
    .on("mousemove", (ev, d) => {
      const n = d.flights.length;
      showTip(ev, `${d.from} ⇌ ${d.to}`,
        `${person(d.p).name} · ${n} flight${n > 1 ? "s" : ""}<br>` +
        d.flights.slice(0, 4).map(f => `${f.date}${f.flight ? " · " + f.flight : ""}`).join("<br>") +
        (n > 4 ? `<br>+${n - 4} more` : ""));
    })
    .on("mouseleave", hideTip);

  // airport dots, sized by visits
  const visits = {};
  for (const f of data.flights) {
    visits[f.from] = (visits[f.from] || 0) + 1;
    visits[f.to] = (visits[f.to] || 0) + 1;
  }
  const rScale = d3.scaleSqrt().domain([1, d3.max(Object.values(visits))]).range([2, 6.5]);
  const dots = Object.entries(data.airports).map(([iata, a]) =>
    ({ iata, name: a[2], city: a[3], coord: [a[0], a[1]], xy: projection([a[0], a[1]]), n: visits[iata] || 0 }))
    .sort((a, b) => b.n - a.n);

  const dotG = root.append("g");
  const halos = dotG.selectAll("circle.halo").data(dots).join("circle")
    .attr("cx", d => d.xy[0]).attr("cy", d => d.xy[1])
    .attr("r", d => rScale(d.n) + 3).attr("fill", "var(--ink)").attr("opacity", 0.06);
  const cores = dotG.selectAll("circle.core").data(dots).join("circle")
    .attr("cx", d => d.xy[0]).attr("cy", d => d.xy[1])
    .attr("r", d => rScale(d.n)).attr("fill", "var(--ink)")
    .attr("stroke", "var(--page)").attr("stroke-width", 1);
  const hits = dotG.selectAll("circle.hit").data(dots).join("circle")
    .attr("cx", d => d.xy[0]).attr("cy", d => d.xy[1])
    .attr("r", d => Math.max(rScale(d.n) + 6, 10)).attr("fill", "transparent")
    .on("mousemove", (ev, d) => {
      labels.attr("display", l => l === d ? null : "none");
      showTip(ev, `${d.iata} — ${d.city || d.name}`, `${d.name}<br>${d.n} flight legs`);
    })
    .on("mouseleave", () => { labels.attr("display", "none"); hideTip(); });

  // labels for every airport: IATA + leg count; only visible while hovered
  const labels = root.append("g").selectAll("text").data(dots).join("text")
    .attr("x", d => d.xy[0] + 8).attr("y", d => d.xy[1] - 6)
    .attr("fill", "var(--ink-2)").attr("font-size", 11)
    .attr("paint-order", "stroke").attr("stroke", "var(--page)").attr("stroke-width", 3);
  labels.append("tspan").text(d => d.iata);
  labels.append("tspan").text(d => ` ${d.n}`).attr("fill", "var(--ink-muted)");

  // The flat projection zooms behind a fixed mask. The globe behaves like a
  // physical sphere: wheel/pinch scales its boundary, and drag spins it.
  let k = 1;
  let currentZoomTransform = d3.zoomIdentity;
  function isPointVisible(d) {
    const limit = morphClip !== null ? morphClip
      : projectionMode === "orthographic" ? Math.PI / 2
      : null;
    if (limit === null) return true;
    const rotation = projection.rotate();
    return d3.geoDistance(d.coord, [-rotation[0], -rotation[1]]) <= limit;
  }
  function updateProjectionGeometry() {
    path.projection(projection);
    const outline = path({ type: "Sphere" });
    clipPath.attr("d", outline);
    globeBackground.attr("d", outline);
    globeOutline.attr("d", outline);
    graticulePath.attr("d", path(d3.geoGraticule10()));
    countryPaths.attr("d", path);
    glowPaths.attr("d", d => path(d.geo));
    corePaths.attr("d", d => path(d.geo));
    hitPaths.attr("d", d => path(d.geo));
    dots.forEach(d => { d.xy = projection(d.coord); });
    const visibility = d => isPointVisible(d) ? null : "none";
    halos.attr("cx", d => d.xy[0]).attr("cy", d => d.xy[1]).attr("display", visibility);
    cores.attr("cx", d => d.xy[0]).attr("cy", d => d.xy[1]).attr("display", visibility);
    hits.attr("cx", d => d.xy[0]).attr("cy", d => d.xy[1]).attr("display", visibility);
    labels
      .attr("x", d => d.xy[0] + 8 / k).attr("y", d => d.xy[1] - 6 / k)
      .attr("display", "none");
    hideTip();
  }
  function scaleMarks() {
    glowPaths.attr("stroke-width", 4.5 / k);
    corePaths.attr("stroke-width", 1.4 / k);
    hitPaths.attr("stroke-width", 12 / k);
    halos.attr("r", d => (rScale(d.n) + 3) / k);
    cores.attr("r", d => rScale(d.n) / k).attr("stroke-width", 1 / k);
    hits.attr("r", d => Math.max(rScale(d.n) + 6, 10) / k);
    labels.attr("font-size", 11 / k).attr("stroke-width", 3 / k);
    countryPaths.attr("stroke-width", 0.5 / k);
  }
  function syncProjectionLayers(transform = currentZoomTransform) {
    const globeMode = projectionMode === "orthographic";
    viewport.attr("clip-path", globeMode ? null : "url(#globe-clip)");
    globeBackground.attr("transform", globeMode ? transform : null);
    globeOutline.attr("transform", globeMode ? transform : null);
  }
  const GLOBE_CLOCK_GAP = 18;
  function globeZoomLimit() {
    const mapRect = svg.node().getBoundingClientRect();
    const clockRects = [...document.querySelectorAll(".clock")]
      .map(clock => clock.getBoundingClientRect());
    if (!mapRect.width || !clockRects.length) return 1;

    const centerX = mapRect.left + mapRect.width / 2;
    const centerY = mapRect.top + mapRect.height / 2;
    const nearestClock = Math.min(...clockRects.map(rect => {
      const dx = Math.max(rect.left - centerX, 0, centerX - rect.right);
      const dy = Math.max(rect.top - centerY, 0, centerY - rect.bottom);
      return Math.hypot(dx, dy);
    }));
    const renderedRadius = projection.scale() * mapRect.width / W;
    return Math.max(1, Math.min(16, (nearestClock - GLOBE_CLOCK_GAP) / renderedRadius));
  }
  function centeredGlobeTransform(transform) {
    const safeScale = Math.min(transform.k, globeZoomLimit());
    return d3.zoomIdentity
      .translate(W / 2, H / 2)
      .scale(safeScale)
      .translate(-W / 2, -H / 2);
  }
  const zoom = d3.zoom()
    // wheel zooms only when it carries ctrlKey — that is a trackpad pinch or
    // ctrl+wheel. A plain two-finger scroll falls through and scrolls the page.
    .filter(event => {
      if (projectionTransitioning) return false;
      zoom.scaleExtent([1, projectionMode === "orthographic" ? globeZoomLimit() : 16]);
      if (event.type === "wheel") return event.ctrlKey;
      if (event.touches) return event.touches.length > 1;
      return projectionMode === "natural" && !event.button;
    })
    .scaleExtent([1, 16])
    .translateExtent([[0, 0], [W, H]])
    .on("start", () => stopGlide())
    .on("zoom", (event) => {
      currentZoomTransform = projectionMode === "orthographic"
        ? centeredGlobeTransform(event.transform)
        : event.transform;
      k = currentZoomTransform.k;
      root.attr("transform", currentZoomTransform);
      syncProjectionLayers(currentZoomTransform);
      scaleMarks();
    });
  window.addEventListener("resize", () => {
    if (projectionMode !== "orthographic") return;
    svg.call(zoom.transform, centeredGlobeTransform(currentZoomTransform));
  });
  // Releasing a drag hands the globe its last velocity, which then bleeds off
  // under friction — degrees per millisecond, so the glide is frame-rate independent.
  let glideFrame = null;
  let glideX = 0, glideY = 0, lastDragAt = 0;
  function stopGlide() {
    if (glideFrame !== null) cancelAnimationFrame(glideFrame);
    glideFrame = null;
    glideX = glideY = 0;
  }
  function rotateBy(dLambda, dPhi) {
    const rotation = projection.rotate();
    projection.rotate([
      rotation[0] + dLambda,
      Math.max(-90, Math.min(90, rotation[1] + dPhi)),
      rotation[2],
    ]);
    updateProjectionGeometry();
  }
  const spin = d3.drag()
    .filter(event => !projectionTransitioning && projectionMode === "orthographic" && (event.button == null || event.button === 0) && (!event.touches || event.touches.length < 2))
    .on("start", () => {
      stopGlide();
      lastDragAt = performance.now();
    })
    .on("drag", (event) => {
      const now = performance.now();
      const dt = Math.max(1, now - lastDragAt);
      lastDragAt = now;
      const sensitivity = 0.32 / Math.sqrt(k);
      const dLambda = event.dx * sensitivity;
      const dPhi = -event.dy * sensitivity;
      // blend with the previous sample so one jittery frame can't fling the globe
      glideX = glideX * 0.4 + (dLambda / dt) * 0.6;
      glideY = glideY * 0.4 + (dPhi / dt) * 0.6;
      rotateBy(dLambda, dPhi);
    })
    .on("end", () => {
      if (reduceMotion || Math.hypot(glideX, glideY) < 0.002) { stopGlide(); return; }
      let last = performance.now();
      glideFrame = requestAnimationFrame(function step(now) {
        const dt = Math.min(50, now - last);
        last = now;
        const friction = Math.pow(0.94, dt / 16.667);
        glideX *= friction;
        glideY *= friction;
        rotateBy(glideX * dt, glideY * dt);
        glideFrame = Math.hypot(glideX, glideY) > 0.0004
          ? requestAnimationFrame(step)
          : null;
      });
    });
  function syncProjectionToggle() {
    projectionToggle.dataset.projection = projectionMode;
    mapWrap.dataset.projection = projectionMode;
    projectionToggle.setAttribute("aria-label", `Switch to ${projectionMode === "natural" ? "globe" : "flat map"} projection`);
    svg.classed("is-globe", projectionMode === "orthographic");
  }
  function applyProjection(mode) {
    projectionMode = mode;
    projection = createProjection(mode);
    svg.call(zoom.transform, d3.zoomIdentity);
    updateProjectionGeometry();
    scaleMarks();
    syncProjectionToggle();
    try { localStorage.setItem("biermarkt-projection", mode); } catch (_) {}
  }
  function setProjection(mode) {
    if (mode === projectionMode || projectionTransitioning) return;
    stopGlide();
    if (reduceMotion) { applyProjection(mode); return; }

    projectionTransitioning = true;
    projectionToggle.disabled = true;
    projectionToggle.setAttribute("aria-busy", "true");
    projectionStage.style("pointer-events", "none");
    hideTip();

    const toFlat = mode === "natural";
    const destination = createProjection(mode);
    const from = projection.rotate();
    const to = destination.rotate();
    // turn to face the destination the short way round rather than unwinding
    const dLambda = ((to[0] - from[0] + 540) % 360) - 180;
    // Scale and centre are carried straight from one end to the other. Fitting
    // the blend to the frame each frame instead makes it swell by half again
    // and shrink back, because the sphere outline it measures goes briefly
    // degenerate while the clip angle opens.
    const scale0 = projection.scale(), scale1 = destination.scale();
    const shift0 = projection.translate(), shift1 = destination.translate();

    // The unroll reframes itself every frame, so any zoom has to come off —
    // eased out alongside it rather than snapped, which would read as a cut.
    const z0 = currentZoomTransform;
    projection = morph;
    viewport.attr("clip-path", null);

    const DURATION = 1100;
    const start = performance.now();
    requestAnimationFrame(function frame(now) {
      const e = Math.min(1, (now - start) / DURATION);
      const s = d3.easeCubicInOut(e);
      const alpha = toFlat ? s : 1 - s;
      morph.alpha(alpha);
      morph.rotate([
        from[0] + dLambda * s,
        from[1] + (to[1] - from[1]) * s,
        from[2] + (to[2] - from[2]) * s,
      ]);
      // d3 trades antimeridian cutting for the circle clip whenever a clip
      // angle is set, so anything crossing the antimeridian streaks straight
      // across the map. That leaves two usable states — the 90° cap, or no
      // clip — and the swap has to happen at the blend where the antipode
      // lands on the limb: before it the far side folds back over the near
      // side, after it the far side is already clear, and at it the far
      // hemisphere is squeezed onto the limb itself, so nothing jumps.
      const capped = alpha < 0.424;
      morphClip = capped ? Math.PI / 2 : Math.PI;
      morph.clipAngle(capped ? 90 : null);
      morph.scale(scale0 + (scale1 - scale0) * s).translate([
        shift0[0] + (shift1[0] - shift0[0]) * s,
        shift0[1] + (shift1[1] - shift0[1]) * s,
      ]);

      const zt = d3.zoomIdentity
        .translate(z0.x * (1 - s), z0.y * (1 - s))
        .scale(z0.k + (1 - z0.k) * s);
      k = zt.k;
      root.attr("transform", zt);
      globeBackground.attr("transform", zt);
      globeOutline.attr("transform", zt);
      updateProjectionGeometry();
      scaleMarks();

      if (e < 1) return requestAnimationFrame(frame);
      morphClip = null;
      applyProjection(mode);
      projectionStage.style("pointer-events", null);
      projectionTransitioning = false;
      projectionToggle.disabled = false;
      projectionToggle.removeAttribute("aria-busy");
    });
  }
  projectionToggle.addEventListener("click", () => {
    setProjection(projectionMode === "natural" ? "orthographic" : "natural");
  });
  svg.call(zoom).on("dblclick.zoom", null).call(spin);
  labels.attr("display", "none");
  updateProjectionGeometry();
  syncProjectionLayers();
  syncProjectionToggle();

  // Idle spin: the globe turns eastward on its own at 10°/s — one revolution
  // every ~36s. A pointer over the map doesn't halt it outright; it coasts
  // down over about a second, and winds back up more gently on the way out.
  const SPIN_DEG_PER_SEC = 10;
  const SPIN_STOP_SECONDS = 1.8;   // hover: time constant of the slow-down
  const SPIN_START_SECONDS = 1.7;  // leave: slower still, so it creeps back in
  let spinEase = 1;              // 0–1 multiplier on the idle rate
  let spinHeld = 0;              // >0 while dragging or flying
  let spinHover = false;
  mapWrap.addEventListener("pointerenter", () => { spinHover = true; });
  mapWrap.addEventListener("pointerleave", () => { spinHover = false; });
  spin.on("start.autospin", () => { spinHeld++; })
      .on("end.autospin", () => { spinHeld--; });
  (window.splashReady || Promise.resolve()).then(() => {
    if (reduceMotion) return;
    let last = null;
    requestAnimationFrame(function tick(now) {
      requestAnimationFrame(tick);
      const dt = last == null ? 0 : Math.min((now - last) / 1000, 0.1);
      last = now;
      if (!dt) return;
      // a hand actually on the globe cuts the idle rate dead; the glide from
      // that drag is what carries the motion instead
      if (spinHeld > 0 || projectionTransitioning || projectionMode !== "orthographic") { spinEase = 0; return; }
      const target = spinHover ? 0 : 1;
      const seconds = target < spinEase ? SPIN_STOP_SECONDS : SPIN_START_SECONDS;
      spinEase += (target - spinEase) * Math.min(1, dt / seconds);
      if (spinEase < 0.002) { spinEase = 0; return; }
      const r = projection.rotate();
      projection.rotate([r[0] - SPIN_DEG_PER_SEC * spinEase * dt, r[1], r[2]]);
      updateProjectionGeometry();
    });
  });

  function showTip(ev, title, body) {
    tooltip.style("opacity", 1)
      .html(`<div class="t">${title}</div>${body}`)
      .style("left", Math.min(ev.clientX + 14, innerWidth - 280) + "px")
      .style("top", (ev.clientY + 14) + "px");
  }
  function hideTip() { tooltip.style("opacity", 0); }

  // airport strip — every airport + leg count, auto-scrolls, hand-scrollable,
  // click flies the map to that airport
  const strip = document.getElementById("airports");
  function flyTo(d) {
    if (projectionMode === "orthographic") {
      stopGlide();
      svg.call(zoom.transform, d3.zoomIdentity);
      const start = projection.rotate();
      let targetLongitude = -d.coord[0];
      while (targetLongitude - start[0] > 180) targetLongitude -= 360;
      while (targetLongitude - start[0] < -180) targetLongitude += 360;
      const interpolate = d3.interpolate(start, [targetLongitude, -d.coord[1], 0]);
      spinHeld++;
      d3.transition("globe-fly").duration(reduceMotion ? 0 : 900).ease(d3.easeCubicInOut)
        .tween("rotate", () => t => {
          projection.rotate(interpolate(t));
          updateProjectionGeometry();
        })
        .on("end interrupt", () => { spinHeld--; });
      return;
    }
    const K = 5;
    const tx = Math.min(0, Math.max(W - K * W, W / 2 - K * d.xy[0]));
    const ty = Math.min(0, Math.max(H - K * H, H / 2 - K * d.xy[1]));
    svg.transition().duration(900).ease(d3.easeCubicInOut)
      .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(K));
  }
  // chips duplicated once so the auto-scroll loops seamlessly;
  // each completed pass reshuffles the order
  function shuffled(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function buildStrip(order) {
    strip.textContent = "";
    for (let pass = 0; pass < 2; pass++) {
      for (const d of order) {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.innerHTML = `<span>${d.iata}</span><span class="n">${d.n}</span>`;
        chip.title = d.city || d.name;
        chip.addEventListener("click", () => flyTo(d));
        strip.appendChild(chip);
      }
    }
  }
  buildStrip(dots);
  // Same easing as the globe: a pointer over the strip doesn't halt it
  // outright, it coasts down to a full stop over about two seconds and winds
  // back up just as gently. A finger on it stops dead — we don't fight a drag.
  const STRIP_PX_PER_SEC = 45;      // ≈ the old 0.75 px/frame at 60fps
  const STRIP_STOP_SECONDS = 2.0;   // hover: time constant of the slow-down
  const STRIP_START_SECONDS = 1.9;  // leave: slower still, so it creeps back in
  let stripEase = 1;         // 0–1 multiplier on the scroll rate
  let stripPaused = false;   // touch drag: stop fully so we don't fight the finger
  let stripHover = false;    // pointer hover: coast to a stop
  strip.addEventListener("pointerenter", () => { stripHover = true; });
  strip.addEventListener("pointerleave", () => { stripHover = false; });
  strip.addEventListener("touchstart", () => { stripPaused = true; }, { passive: true });
  strip.addEventListener("touchend", () => { setTimeout(() => { stripPaused = false; }, 2500); });
  const reducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
  let acc = 0;
  let stripLast = null;
  (function autoScroll(now) {
    requestAnimationFrame(autoScroll);
    const dt = stripLast == null ? 0 : Math.min((now - stripLast) / 1000, 0.1);
    stripLast = now;
    if (!dt || reducedMotion) return;
    if (stripPaused) { stripEase = 0; return; }
    const target = stripHover ? 0 : 1;
    const seconds = target < stripEase ? STRIP_STOP_SECONDS : STRIP_START_SECONDS;
    stripEase += (target - stripEase) * Math.min(1, dt / seconds);
    if (stripEase < 0.002) { stripEase = 0; return; }
    acc += STRIP_PX_PER_SEC * stripEase * dt;
    if (acc >= 1) {
      strip.scrollLeft += Math.floor(acc);
      acc -= Math.floor(acc);
      if (strip.scrollLeft >= strip.scrollWidth / 2) {
        const overshoot = strip.scrollLeft - strip.scrollWidth / 2;
        buildStrip(shuffled(dots));
        strip.scrollLeft = overshoot;
      }
    }
  })();

  // stat tiles with count-up
  const fmt = d3.format(",");
  const tiles = [
    ["flights", data.totals.flights],
    ["kilometers", data.totals.km],
    ["airports", data.totals.airports],
    ["countries", data.totals.countries],
  ];
  const tileSel = d3.select("#stats").selectAll("div").data(tiles).join("div")
    .attr("class", "tile")
    .html(([k]) => `<div class="v">0</div><div class="k">${k}</div>`);
  tileSel.select(".v").transition().delay(400).duration(1400)
    .tween("count", function ([, value]) {
      const interpolate = d3.interpolateNumber(0, value);
      return t => { this.textContent = fmt(Math.round(interpolate(t))); };
  });
})();
</script>
</body>
</html>
