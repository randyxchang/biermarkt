<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>biermarkt</title>
<style>
  :root {
    color-scheme: dark;
    --page: #000;
    --land: #000;
    --land-stroke: rgba(255,255,255,0.35);
    --graticule: rgba(255,255,255,0.08);
    --ink: #fff;
    --ink-2: rgba(255,255,255,0.75);
    --ink-muted: rgba(255,255,255,0.52);
    --hairline: rgba(255,255,255,0.18);
    --tile: #000;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --page: #fff;
    --land: #fff;
    --land-stroke: rgba(0,0,0,0.35);
    --graticule: rgba(0,0,0,0.08);
    --ink: #000;
    --ink-2: rgba(0,0,0,0.75);
    --ink-muted: rgba(0,0,0,0.52);
    --hairline: rgba(0,0,0,0.18);
    --tile: #fff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--page); color: var(--ink); }
  body {
    font-family: ui-monospace, "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-variant-numeric: tabular-nums;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header { text-align: center; padding: 2.2rem 1rem 0.4rem; }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 400;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    text-transform: lowercase;
    margin: 0;
  }
  #airports {
    width: min(1200px, 100%);
    display: flex;
    gap: 0.45rem;
    overflow-x: auto;
    padding: 1.1rem 1rem 0.4rem;
    scrollbar-width: none;
    -webkit-mask-image: linear-gradient(to right, transparent, black 4%, black 96%, transparent);
    mask-image: linear-gradient(to right, transparent, black 4%, black 96%, transparent);
  }
  #airports::-webkit-scrollbar { display: none; }
  .chip {
    flex: none;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.28rem 0.7rem;
    border: 1px solid var(--hairline);
    border-radius: 10px;
    background: var(--tile);
    color: var(--ink-2);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s;
    user-select: none;
  }
  .chip .n { color: var(--ink-muted); font-variant-numeric: tabular-nums; }
  .chip:hover { border-color: var(--ink); }
  #theme-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 0.6rem;
    padding: 0.45rem;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    background: var(--page);
    color: var(--ink);
    cursor: pointer;
  }
  #theme-toggle svg { width: 15px; height: 15px; display: block; }
  #theme-toggle .moon { display: none; }
  :root[data-theme="light"] #theme-toggle .sun { display: none; }
  :root[data-theme="light"] #theme-toggle .moon { display: block; }
  #theme-toggle:hover { border-color: var(--ink); }
  #theme-toggle:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; }
  #map-wrap { width: min(1200px, 100%); padding: 0 0.5rem; position: relative; }
  svg { width: 100%; height: auto; display: block; cursor: grab; }
  svg:active { cursor: grabbing; }
  #stats {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.6rem;
    padding: 0.4rem 1rem 2.5rem;
  }
  .tile {
    min-width: 130px;
    padding: 0.9rem 1.2rem;
    border: 1px solid var(--hairline);
    border-radius: 2px;
    background: var(--tile);
    text-align: center;
  }
  .tile .v {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 1.5rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .tile .k {
    color: var(--ink-muted);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-top: 0.25rem;
  }
  #contact {
    color: var(--ink-muted);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-decoration: none;
    margin-top: -1.4rem;
    padding-bottom: 2.2rem;
  }
  #contact:hover { color: var(--ink-2); text-decoration: underline; }
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--page);
    border: 1px solid var(--hairline);
    border-radius: 2px;
    padding: 0.5rem 0.7rem;
    font-size: 0.8rem;
    color: var(--ink-2);
    max-width: 260px;
    opacity: 0;
    transition: opacity 0.12s;
    z-index: 10;
    box-shadow: none;
  }
  #tooltip .t { color: var(--ink); font-weight: 600; margin-bottom: 0.15rem; }
</style>
<script>
  try {
    document.documentElement.dataset.theme =
      localStorage.getItem("biermarkt-theme") === "light" ? "light" : "dark";
  } catch (_) {
    document.documentElement.dataset.theme = "dark";
  }
</script>
</head>
<body>
<header>
  <h1>biermarkt</h1>
  <button id="theme-toggle" type="button" aria-label="Switch to light mode">
    <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</header>
<div id="airports" aria-label="All airports"></div>
<div id="map-wrap"><svg id="map"></svg></div>
<div id="stats"></div>
<a id="contact" href="mailto:bm@biermarkt.org">bm@biermarkt.org</a>
<div id="tooltip"></div>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
(async function () {
  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const themeToggle = document.querySelector("#theme-toggle");
  function syncThemeToggle() {
    const dark = document.documentElement.dataset.theme === "dark";
    themeToggle.setAttribute("aria-label", `Switch to ${dark ? "light" : "dark"} mode`);
  }
  themeToggle.addEventListener("click", () => {
    const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem("biermarkt-theme", next); } catch (_) {}
    syncThemeToggle();
  });
  syncThemeToggle();

  const [world, data] = await Promise.all([
    fetch("assets/countries-110m.json").then(r => r.json()),
    fetch("assets/flights.json").then(r => r.json()),
  ]);

  const W = 1200, H = 620;
  const svg = d3.select("#map").attr("viewBox", `0 0 ${W} ${H}`);
  const root = svg.append("g");
  const projection = d3.geoNaturalEarth1().fitExtent([[8, 8], [W - 8, H - 8]], { type: "Sphere" });
  const path = d3.geoPath(projection);
  const tooltip = d3.select("#tooltip");

  root.append("path").attr("d", path({ type: "Sphere" }))
    .attr("fill", "var(--page)").attr("stroke", "var(--hairline)");
  root.append("path").attr("d", path(d3.geoGraticule10()))
    .attr("fill", "none").attr("stroke", "var(--graticule)").attr("stroke-width", 0.5);
  root.append("g").selectAll("path")
    .data(topojson.feature(world, world.objects.countries).features)
    .join("path").attr("d", path)
    .attr("fill", "var(--land)").attr("stroke", "var(--land-stroke)")
    .attr("stroke-width", 0.5).attr("class", "country");

  // one entry per (person, route) with flight count — arcs stack visually otherwise
  const routes = new Map();
  for (const f of data.flights) {
    const key = `${f.p}|${[f.from, f.to].sort().join("-")}`;
    if (!routes.has(key)) routes.set(key, { p: f.p, from: f.from, to: f.to, flights: [] });
    routes.get(key).flights.push(f);
  }
  const arcs = [...routes.values()].map(r => {
    const a = data.airports[r.from], b = data.airports[r.to];
    return { ...r, geo: { type: "LineString", coordinates: [[a[0], a[1]], [b[0], b[1]]] } };
  });

  const arcLayer = root.append("g");
  const glow = arcLayer.append("g");
  const core = arcLayer.append("g");
  const hover = arcLayer.append("g");

  const person = i => data.people[i];

  const glowPaths = glow.selectAll("path").data(arcs).join("path")
    .attr("d", d => path(d.geo)).attr("fill", "none")
    .attr("stroke", "var(--ink)")
    .attr("stroke-width", 4.5).attr("stroke-linecap", "round")
    .attr("opacity", 0.16).attr("class", d => `arc p${d.p}`);

  const corePaths = core.selectAll("path").data(arcs).join("path")
    .attr("d", d => path(d.geo)).attr("fill", "none")
    .attr("stroke", "var(--ink)")
    .attr("stroke-width", 1.4).attr("stroke-linecap", "round")
    .attr("opacity", 0.85).attr("class", d => `arc p${d.p}`);

  // draw-in animation
  if (!reduceMotion) {
    corePaths.each(function (d, i) {
      const len = this.getTotalLength();
      d3.select(this)
        .attr("stroke-dasharray", `${len} ${len}`)
        .attr("stroke-dashoffset", len)
        .transition()
        .delay(200 + i * (2800 / Math.max(1, arcs.length - 1)))
        .duration(2000).ease(d3.easeCubicOut)
        .attr("stroke-dashoffset", 0)
        .on("end", function () { d3.select(this).attr("stroke-dasharray", null); });
    });
  }

  // wide invisible strokes = hover hit targets bigger than the mark
  const hitPaths = hover.selectAll("path").data(arcs).join("path")
    .attr("d", d => path(d.geo)).attr("fill", "none")
    .attr("stroke", "transparent").attr("stroke-width", 12)
    .attr("class", d => `arc p${d.p}`)
    .on("mousemove", (ev, d) => {
      const n = d.flights.length;
      showTip(ev, `${d.from} ⇌ ${d.to}`,
        `${person(d.p).name} · ${n} flight${n > 1 ? "s" : ""}<br>` +
        d.flights.slice(0, 4).map(f => `${f.date}${f.flight ? " · " + f.flight : ""}`).join("<br>") +
        (n > 4 ? `<br>+${n - 4} more` : ""));
    })
    .on("mouseleave", hideTip);

  // airport dots, sized by visits
  const visits = {};
  for (const f of data.flights) {
    visits[f.from] = (visits[f.from] || 0) + 1;
    visits[f.to] = (visits[f.to] || 0) + 1;
  }
  const rScale = d3.scaleSqrt().domain([1, d3.max(Object.values(visits))]).range([2, 6.5]);
  const dots = Object.entries(data.airports).map(([iata, a]) =>
    ({ iata, name: a[2], city: a[3], xy: projection([a[0], a[1]]), n: visits[iata] || 0 }))
    .sort((a, b) => b.n - a.n);

  const dotG = root.append("g");
  const halos = dotG.selectAll("circle.halo").data(dots).join("circle")
    .attr("cx", d => d.xy[0]).attr("cy", d => d.xy[1])
    .attr("r", d => rScale(d.n) + 3).attr("fill", "var(--ink)").attr("opacity", 0.06);
  const cores = dotG.selectAll("circle.core").data(dots).join("circle")
    .attr("cx", d => d.xy[0]).attr("cy", d => d.xy[1])
    .attr("r", d => rScale(d.n)).attr("fill", "var(--ink)")
    .attr("stroke", "var(--page)").attr("stroke-width", 1);
  const hits = dotG.selectAll("circle.hit").data(dots).join("circle")
    .attr("cx", d => d.xy[0]).attr("cy", d => d.xy[1])
    .attr("r", d => Math.max(rScale(d.n) + 6, 10)).attr("fill", "transparent")
    .on("mousemove", (ev, d) =>
      showTip(ev, `${d.iata} — ${d.city || d.name}`, `${d.name}<br>${d.n} flight legs`))
    .on("mouseleave", hideTip);

  // labels for every airport: IATA + leg count; fade in by rank as zoom deepens
  const labels = root.append("g").selectAll("text").data(dots).join("text")
    .attr("x", d => d.xy[0] + 8).attr("y", d => d.xy[1] - 6)
    .attr("fill", "var(--ink-2)").attr("font-size", 11)
    .attr("paint-order", "stroke").attr("stroke", "var(--page)").attr("stroke-width", 3);
  labels.append("tspan").text(d => d.iata);
  labels.append("tspan").text(d => ` ${d.n}`).attr("fill", "var(--ink-muted)");

  function labelCount(k) { return Math.ceil(10 * Math.pow(k, 1.8)); }

  // zoom & pan; marks divide by k so they stay crisp at screen scale
  let k = 1;
  const zoom = d3.zoom()
    .scaleExtent([1, 16])
    .translateExtent([[0, 0], [W, H]])
    .on("zoom", (ev) => {
      k = ev.transform.k;
      root.attr("transform", ev.transform);
      glowPaths.attr("stroke-width", 4.5 / k);
      corePaths.attr("stroke-width", 1.4 / k);
      hitPaths.attr("stroke-width", 12 / k);
      halos.attr("r", d => (rScale(d.n) + 3) / k);
      cores.attr("r", d => rScale(d.n) / k).attr("stroke-width", 1 / k);
      hits.attr("r", d => Math.max(rScale(d.n) + 6, 10) / k);
      const show = labelCount(k);
      labels
        .attr("font-size", 11 / k)
        .attr("x", d => d.xy[0] + 8 / k).attr("y", d => d.xy[1] - 6 / k)
        .attr("stroke-width", 3 / k)
        .attr("display", (d, i) => i < show ? null : "none");
      countryPaths.attr("stroke-width", 0.5 / k);
    });
  const countryPaths = root.selectAll(".country");
  svg.call(zoom).on("dblclick.zoom", null);
  labels.attr("display", (d, i) => i < labelCount(1) ? null : "none");

  function showTip(ev, title, body) {
    tooltip.style("opacity", 1)
      .html(`<div class="t">${title}</div>${body}`)
      .style("left", Math.min(ev.clientX + 14, innerWidth - 280) + "px")
      .style("top", (ev.clientY + 14) + "px");
  }
  function hideTip() { tooltip.style("opacity", 0); }

  // airport strip — every airport + leg count, auto-scrolls, hand-scrollable,
  // click flies the map to that airport
  const strip = document.getElementById("airports");
  function flyTo(d) {
    const K = 5;
    const tx = Math.min(0, Math.max(W - K * W, W / 2 - K * d.xy[0]));
    const ty = Math.min(0, Math.max(H - K * H, H / 2 - K * d.xy[1]));
    svg.transition().duration(900).ease(d3.easeCubicInOut)
      .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(K));
  }
  // chips duplicated once so the auto-scroll loops seamlessly;
  // each completed pass reshuffles the order
  function shuffled(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function buildStrip(order) {
    strip.textContent = "";
    for (let pass = 0; pass < 2; pass++) {
      for (const d of order) {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.innerHTML = `<span>${d.iata}</span><span class="n">${d.n}</span>`;
        chip.title = d.city || d.name;
        chip.addEventListener("click", () => flyTo(d));
        strip.appendChild(chip);
      }
    }
  }
  buildStrip(dots);
  let stripPaused = false;   // touch drag: stop fully so we don't fight the finger
  let stripHover = false;    // pointer hover: just slow down
  strip.addEventListener("pointerenter", () => { stripHover = true; });
  strip.addEventListener("pointerleave", () => { stripHover = false; });
  strip.addEventListener("touchstart", () => { stripPaused = true; }, { passive: true });
  strip.addEventListener("touchend", () => { setTimeout(() => { stripPaused = false; }, 2500); });
  const reducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
  let acc = 0;
  (function autoScroll() {
    if (!stripPaused && !reducedMotion) {
      acc += stripHover ? 0.18 : 0.75;
      if (acc >= 1) {
        strip.scrollLeft += Math.floor(acc);
        acc -= Math.floor(acc);
        if (strip.scrollLeft >= strip.scrollWidth / 2) {
          const overshoot = strip.scrollLeft - strip.scrollWidth / 2;
          buildStrip(shuffled(dots));
          strip.scrollLeft = overshoot;
        }
      }
    }
    requestAnimationFrame(autoScroll);
  })();

  // stat tiles with count-up
  const fmt = d3.format(",");
  const tiles = [
    ["flights", data.totals.flights],
    ["kilometers", data.totals.km],
    ["airports", data.totals.airports],
    ["countries", data.totals.countries],
  ];
  const tileSel = d3.select("#stats").selectAll("div").data(tiles).join("div")
    .attr("class", "tile")
    .html(([k]) => `<div class="v">0</div><div class="k">${k}</div>`);
  tileSel.select(".v").transition().delay(400).duration(1400)
    .tween("count", function ([, value]) {
      const interpolate = d3.interpolateNumber(0, value);
      return t => { this.textContent = fmt(Math.round(interpolate(t))); };
  });
})();
</script>
</body>
</html>
